<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#10224c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FLUIDE" />
    <title>FLUIDE — парфюмерный каталог</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="app-icon-192.png" />
    <link rel="stylesheet" href="styles.css?v=4" />
  </head>
  <body>
    <main class="welcome" aria-label="Главная страница каталога FLUIDE">
      <video
        class="welcome__video"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
        aria-hidden="true"
      >
        <source src="фон анимация.mp4" type="video/mp4" />
      </video>

      <img
        class="welcome__overlay"
        src="затемнение на фон синее.svg"
        alt=""
        aria-hidden="true"
      />

      <div class="welcome__content">
        <a class="welcome__button" href="catalog.html">Перейти в каталог</a>

        <img
          class="welcome__logo"
          src="логотип FLUIDE белый.svg"
          alt="FLUIDE Atelier"
        />
      </div>
    </main>
    <script src="pwa.js"></script>
  </body>
</html>
