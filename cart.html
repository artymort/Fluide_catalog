<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f0e6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="FLUIDE" />
    <title>FLUIDE — корзина</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="app-icon-192.png" />
    <link rel="stylesheet" href="fonts.css?v=1" />
    <link rel="stylesheet" href="cart.css?v=2" />
  </head>
  <body>
    <main class="cart-screen">
      <header class="cart-header">
        <button class="cart-back" id="cart-back" type="button" aria-label="Вернуться назад">←</button>
        <a class="cart-logo-link" href="index.html" aria-label="Перейти в главное меню">
          <img class="cart-logo" src="логотип FLUIDE сниний.svg" alt="FLUIDE Atelier" />
        </a>
        <a class="cart-catalog" href="all.html">Все товары</a>
      </header>

      <section class="cart-content" aria-labelledby="cart-title">
        <div class="cart-heading">
          <div><h1 id="cart-title">Корзина</h1></div>
          <button class="clear-cart" id="clear-cart" type="button">Очистить корзину</button>
        </div>

        <div class="cart-status" id="cart-status" aria-live="polite"></div>
        <div class="cart-list" id="cart-list"></div>
      </section>
    </main>

    <script src="pwa.js?v=35"></script>
    <script src="cart.js?v=3"></script>
  </body>
</html>
