<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f4f0e6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FLUIDE" />
    <title>FLUIDE — подбор аромата</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="app-icon-192.png" />
    <link rel="stylesheet" href="fonts.css?v=1" />
    <link rel="stylesheet" href="shared-header.css?v=1" />
    <link rel="stylesheet" href="selection.css?v=7" />
  </head>
  <body>
    <main class="selection-screen">
      <header class="selection-header">
        <a class="selection-back" href="index.html" aria-label="Вернуться в главное меню">←</a>
        <a class="site-logo-link" href="index.html" aria-label="Перейти в главное меню">
          <img class="selection-logo" src="логотип FLUIDE сниний.svg" alt="FLUIDE Atelier" />
        </a>
        <div class="site-header-actions">
          <p class="selection-step" aria-label="Первый шаг из четырех">Шаг 01 / 04</p>
          <button class="site-cart" type="button" aria-label="Выбранные товары: 0">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16l-1.4 12H5.4L4 7Z" /><path d="M8 9V6a4 4 0 0 1 8 0v3" /></svg>
            <span class="site-cart__count">0</span>
          </button>
        </div>
      </header>

      <section class="selection-content" aria-labelledby="selection-title">
        <div class="selection-heading">
          <p class="selection-kicker">Подбор аромата</p>
          <h1 id="selection-title">Для кого выбираем аромат?</h1>
          <p class="selection-help" id="selection-help">Выберите один вариант</p>
        </div>

        <form class="selection-form" id="selection-form">
          <div class="selection-options" id="selection-options"></div>

          <div class="selection-actions">
            <button class="selection-previous" type="button" hidden>Назад</button>
            <button class="selection-skip" type="button">Пропустить</button>
            <button class="selection-next" type="submit" disabled>
              Продолжить
              <span aria-hidden="true">→</span>
            </button>
          </div>
          <p class="selection-status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <div class="rotate-message" role="status">
      <img src="логотип FLUIDE сниний.svg" alt="FLUIDE Atelier" />
      <p>Поверните устройство горизонтально</p>
    </div>

    <script src="pwa.js?v=26"></script>
    <script src="selection.js?v=5"></script>
  </body>
</html>
