<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f0e6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="FLUIDE" />
    <title>FLUIDE — выбранные ароматы</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="app-icon-192.png" />
    <link rel="stylesheet" href="fonts.css?v=1" />
    <link rel="stylesheet" href="shared-header.css?v=1" />
    <link rel="stylesheet" href="results.css?v=8" />
  </head>
  <body data-catalog-mode="selection">
    <main class="store-screen">
      <header class="store-header">
        <a class="round-link" id="results-back" href="selection.html" aria-label="Вернуться к подбору">←</a>
        <a class="site-logo-link" href="index.html" aria-label="Перейти в главное меню">
          <img class="store-logo" src="логотип FLUIDE сниний.svg" alt="FLUIDE Atelier" />
        </a>
        <div class="site-header-actions">
          <a class="store-selection-link" href="selection.html">Подобрать ароматы</a>
          <button class="site-cart" type="button" aria-label="Выбранные товары: 0">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16l-1.4 12H5.4L4 7Z" />
              <path d="M8 9V6a4 4 0 0 1 8 0v3" />
            </svg>
            <span class="site-cart__count">0</span>
          </button>
        </div>
      </header>

      <section class="store-intro">
        <div>
          <p class="store-kicker" id="results-kicker">Каталог FLUIDE</p>
          <h1 id="results-title">Подходящие ароматы</h1>
        </div>
        <div class="catalog-controls">
          <nav class="catalog-sections" aria-label="Разделы каталога">
            <button class="catalog-section is-active" type="button" data-section="perfume" aria-pressed="true">Парфюм</button>
            <button class="catalog-section" type="button" data-section="care" aria-pressed="false">Уходовая косметика</button>
            <button class="catalog-section" type="button" data-section="home" aria-pressed="false">Товары для дома</button>
            <button class="catalog-section" type="button" data-section="car" aria-pressed="false">Автопарфюм</button>
          </nav>
          <label class="store-search">
            <span class="visually-hidden">Поиск по каталогу</span>
            <input id="search" type="search" placeholder="Поиск по названию или номеру" />
          </label>
        </div>
      </section>

      <div class="store-layout">
        <aside class="filters" aria-label="Фильтры каталога">
          <div class="filters__heading">
            <h2>Фильтры</h2>
            <button id="reset-filters" type="button">Сбросить</button>
          </div>

          <div class="catalog-filter-group" data-filter-section="perfume">
            <fieldset>
              <legend>Тип парфюма</legend>
              <label><input type="checkbox" name="subtype" value="fragrance" /> Парфюм-спрей</label>
              <label><input type="checkbox" name="subtype" value="solid-perfume" /> Твёрдый парфюм</label>
            </fieldset>
            <fieldset>
              <legend>Кому подбираем?</legend>
              <label><input type="radio" name="catalogGender" value="женский" /> Женские</label>
              <label><input type="radio" name="catalogGender" value="мужской" /> Мужские</label>
              <label><input type="radio" name="catalogGender" value="унисекс" /> Унисекс</label>
            </fieldset>
            <fieldset>
              <legend>Случай</legend>
              <label><input type="checkbox" name="occasion" value="everyday" /> На каждый день</label>
              <label><input type="checkbox" name="occasion" value="evening" /> Вечерние</label>
              <label><input type="checkbox" name="occasion" value="date" /> Свидание</label>
              <label><input type="checkbox" name="occasion" value="gym" /> Спортзал</label>
              <label><input type="checkbox" name="occasion" value="walk" /> Прогулка</label>
            </fieldset>
            <fieldset>
              <legend>Ноты</legend>
              <label><input type="checkbox" name="catalogFamily" value="Цветочные" /> Цветочные</label>
              <label><input type="checkbox" name="catalogFamily" value="Фруктовые" /> Фруктовые</label>
              <label><input type="checkbox" name="catalogFamily" value="Цитрусовые" /> Цитрусовые</label>
              <label><input type="checkbox" name="catalogFamily" value="Древесные" /> Древесные</label>
              <label><input type="checkbox" name="catalogFamily" value="Сладкие" /> Сладкие</label>
              <label><input type="checkbox" name="catalogFamily" value="Свежие" /> Свежие</label>
              <label><input type="checkbox" name="catalogFamily" value="Пряные и восточные" /> Пряные</label>
            </fieldset>
            <fieldset>
              <legend>Время года</legend>
              <label><input type="checkbox" name="season" value="summer" /> Лето</label>
              <label><input type="checkbox" name="season" value="autumn" /> Осень</label>
              <label><input type="checkbox" name="season" value="winter" /> Зима</label>
              <label><input type="checkbox" name="season" value="spring" /> Весна</label>
            </fieldset>
          </div>

          <div class="catalog-filter-group" data-filter-section="care" hidden>
            <fieldset>
              <legend>Тип продукции</legend>
              <label><input type="checkbox" name="subtype" value="body-cream" /> Крем для тела</label>
              <label><input type="checkbox" name="subtype" value="hair-spray" /> Спрей для волос</label>
              <label><input type="checkbox" name="subtype" value="hand-soap" /> Мыло</label>
            </fieldset>
          </div>

          <div class="catalog-filter-group" data-filter-section="home" hidden>
            <fieldset>
              <legend>Тип продукции</legend>
              <label><input type="checkbox" name="subtype" value="home-fragrance" /> Парфюм для дома</label>
              <label><input type="checkbox" name="subtype" value="candle" /> Свечи</label>
              <label><input type="checkbox" name="subtype" value="diffuser" /> Аромадиффузоры</label>
            </fieldset>
          </div>

          <div class="catalog-filter-group" data-filter-section="car" hidden>
            <fieldset>
              <legend>Тип продукции</legend>
              <label><input type="checkbox" name="subtype" value="car-fragrance" /> Автопарфюм</label>
            </fieldset>
          </div>
        </aside>

        <section class="products" aria-live="polite">
          <div class="products__summary">
            <p id="result-count">Загрузка ароматов…</p>
          </div>
          <div class="products-grid" id="products-grid"></div>
        </section>
      </div>
    </main>

    <script src="pwa.js?v=3"></script>
    <script src="results.js?v=11"></script>
  </body>
</html>
