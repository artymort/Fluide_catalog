<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f0e6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="FLUIDE" />
    <title>FLUIDE — хиты сезона</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="app-icon-192.png" />
    <link rel="stylesheet" href="fonts.css?v=1" />
    <link rel="stylesheet" href="shared-header.css?v=1" />
    <link rel="stylesheet" href="results.css?v=8" />
    <link rel="stylesheet" href="hits.css?v=2" />
  </head>
  <body>
    <main class="season-screen">
      <header class="store-header">
        <a class="round-link" href="index.html" aria-label="Вернуться в главное меню">←</a>
        <a class="site-logo-link" href="index.html" aria-label="Перейти в главное меню">
          <img class="store-logo" src="логотип FLUIDE сниний.svg" alt="FLUIDE Atelier" />
        </a>
        <div class="site-header-actions">
          <a class="store-selection-link" href="all.html">Все ароматы</a>
          <button class="site-cart" type="button" aria-label="Выбранные товары: 0">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16l-1.4 12H5.4L4 7Z" />
              <path d="M8 9V6a4 4 0 0 1 8 0v3" />
            </svg>
            <span class="site-cart__count">0</span>
          </button>
        </div>
      </header>

      <div class="season-scroll">
        <section class="season-hero" aria-labelledby="season-title">
          <div class="season-hero__content">
            <h1 id="season-title">Хиты сезона</h1>
            <p class="season-lead">Ароматы, которые задают настроение этого лета — от прозрачных цитрусов до мягких цветов и древесного шлейфа.</p>
            <div class="season-moods" aria-label="Настроения подборки">
              <span>Свежий старт</span>
              <span>Цветочный свет</span>
              <span>Древесный шлейф</span>
            </div>
          </div>
        </section>

        <section class="season-catalog" aria-labelledby="season-catalog-title">
          <div class="season-catalog__heading">
            <h2 id="season-catalog-title">Попробуйте этим летом</h2>
          </div>
          <div class="products-grid hits-grid" id="hits-grid" aria-live="polite"></div>
        </section>
      </div>
    </main>

    <script src="pwa.js?v=35"></script>
    <script src="hits.js?v=3"></script>
  </body>
</html>
